name: Release

# Publish to PyPI when a version tag (vX.Y.Z) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret needed. One-time
# setup on PyPI: project "slak" → Publishing → add a GitHub publisher with
#   owner=Frodotus, repo=slak, workflow=release.yml, environment=pypi
# (use a "pending publisher" for the very first release before the project
# exists). See https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Verify tag matches the package version
        run: python .github/check_version.py
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish  # only after the PyPI upload succeeds
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          --title "slak ${GITHUB_REF_NAME#v}"
          --verify-tag --generate-notes
