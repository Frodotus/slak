name: Release

# Publish to PyPI when a version tag (vX.Y.Z) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret needed. One-time
# setup on PyPI: project "slak" → Publishing → add a GitHub publisher with
#   owner=Frodotus, repo=slak, workflow=release.yml, environment=pypi
# (use a "pending publisher" for the very first release before the project
# exists). See https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Verify tag matches the package version
        run: python .github/check_version.py
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # tolerate re-runs of an already-published version

  # Self-contained .deb per Ubuntu LTS. The bundle is tied to that release's
  # Python minor + arch (Pillow ships a compiled extension), so one job per image.
  deb:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # one Ubuntu failing shouldn't cancel the others
      matrix:
        # slak needs Python >= 3.12, so only releases that ship it qualify
        # (Ubuntu 24.04 = 3.12; 22.04 has 3.10 and is unsupported).
        include:
          - { image: "ubuntu:24.04", codename: "noble" }
    container: ${{ matrix.image }}
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-venv python3-pip binutils dpkg-dev git ca-certificates
      - uses: actions/checkout@v6
      - name: Build .deb
        run: |
          packaging/build-deb.sh
          # disambiguate the per-release artifact (same arch, different python dep)
          v="${GITHUB_REF_NAME#v}"
          mv dist/slak_*.deb "dist/slak_${v}_${{ matrix.codename }}_amd64.deb"
      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.codename }}
          path: dist/*.deb

  github-release:
    needs: [publish, deb]  # after PyPI upload and the .deb builds
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
    steps:
      - uses: actions/checkout@v6
      - name: Collect .deb artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: deb-*
          merge-multiple: true
          path: debs/
      - name: Create GitHub Release with notes + .deb assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          --title "slak ${GITHUB_REF_NAME#v}"
          --verify-tag --generate-notes
          debs/*.deb
