name: Release

# Publish to PyPI when a version tag (vX.Y.Z) is pushed.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret needed. One-time
# setup on PyPI: project "slak" → Publishing → add a GitHub publisher with
#   owner=Frodotus, repo=slak, workflow=release.yml, environment=pypi
# (use a "pending publisher" for the very first release before the project
# exists). See https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Verify tag matches the package version
        run: python .github/check_version.py
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
